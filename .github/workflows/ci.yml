name: K2 EnerjiPro CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: k2-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify — typecheck, lint, unit tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b --pretty false

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

      - name: Production build
        run: npm run build

  coverage:
    name: Coverage — unit and integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k2-coverage-report
          path: coverage
          if-no-files-found: warn
          retention-days: 7

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k2-playwright-results
          path: |
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 7

  financial-matrix:
    name: Financial Matrix — 2,160 scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run K2 financial matrix
        run: npm run test:k2-matrix

      - name: Upload financial matrix results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k2-financial-matrix-results
          path: test-results/k2-*
          if-no-files-found: warn
          retention-days: 7
